<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Ingeniería de Métodos</title>

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
      }

      .card {
        transition: all 0.35s ease;
      }

      .card:hover {
        transform: translateY(-10px) scale(1.03);
      }
    </style>
  </head>

  <body class="min-h-screen flex flex-col">
    <!-- HEADER -->
    <header class="bg-slate-900 shadow-lg">
      <div
        class="max-w-7xl mx-auto px-5 py-6 flex flex-col md:flex-row justify-between items-center gap-3"
      >
        <div class="flex items-center gap-3">
          <i data-lucide="graduation-cap" class="text-white w-10 h-10"></i>

          <h1
            class="text-2xl md:text-3xl font-bold text-white text-center md:text-left"
          >
            Sistema de Ingeniería de Métodos
          </h1>
        </div>

        <span class="text-slate-300 text-center md:text-right">
          Herramientas de Análisis
        </span>
      </div>
    </header>

    <!-- CONTENIDO -->
    <main class="flex-1 flex items-center justify-center">
      <div
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 p-6 md:p-10 w-full max-w-7xl"
      >
        <!-- GRAFOS -->
        <button
          onclick="window.location.href = 'Grafos.html'"
          class="card bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm mx-auto hover:bg-blue-600 hover:text-white group"
        >
          <div class="flex justify-center mb-6">
            <i data-lucide="network" class="w-14 h-14 md:w-16 md:h-16"></i>
          </div>

          <h2 class="text-xl md:text-2xl font-bold text-center mb-3">GRAFOS</h2>

          <p
            class="text-sm md:text-base text-center text-gray-500 group-hover:text-white"
          >
            Construcción y análisis de grafos, rutas críticas, árboles de
            expansión y redes de proyectos.
          </p>
        </button>

        <!-- TIEMPO ESTÁNDAR -->
        <button
          onclick="window.location.href = 'TiempoEstandar.html'"
          class="card bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm mx-auto hover:bg-emerald-600 hover:text-white group"
        >
          <div class="flex justify-center mb-6">
            <i data-lucide="timer" class="w-14 h-14 md:w-16 md:h-16"></i>
          </div>

          <h2 class="text-xl md:text-2xl font-bold text-center mb-3">
            TIEMPO ESTÁNDAR
          </h2>

          <p
            class="text-sm md:text-base text-center text-gray-500 group-hover:text-white"
          >
            Cálculo del tiempo normal, suplementos, valoración del operario y
            tiempo estándar.
          </p>
        </button>

        <!-- HOMBRE MÁQUINA -->
        <button
          class="card bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm mx-auto hover:bg-orange-500 hover:text-white group"
        >
          <div class="flex justify-center mb-6">
            <i data-lucide="factory" class="w-14 h-14 md:w-16 md:h-16"></i>
          </div>

          <h2 class="text-xl md:text-2xl font-bold text-center mb-3">
            DIAGRAMA HOMBRE-MÁQUINA
          </h2>

          <p
            class="text-sm md:text-base text-center text-gray-500 group-hover:text-white"
          >
            Elaboración y análisis del diagrama Hombre-Máquina para optimizar la
            utilización de recursos.
          </p>
        </button>
      </div>
    </main>

    <!-- FOOTER -->
    <footer
      class="bg-slate-900 text-slate-400 text-center py-5 px-4 text-sm md:text-base"
    >
      Ingeniería de Métodos © 2026
    </footer>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
